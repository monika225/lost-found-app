<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Post Item </h2>

<select id="type">
  <option value="lost">Lost</option>
  <option value="found">Found</option>
</select>

<input type="text" id="name" placeholder="Item name">
<input type="text" id="location" placeholder="Location">

<button onclick="submitItem()">Submit</button>

<!-- 🔥 Firebase scripts FIRST -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDAZUMAUEE6QmlmVO1CGu_AtD-XTGp9yQk",
  authDomain: "lost-found-app-52193.firebaseapp.com",
  projectId: "lost-found-app-52193",
  storageBucket: "lost-found-app-52193.firebasestorage.app",
  messagingSenderId: "233563240938",
  appId: "1:233563240938:web:a8beacdf4c2b17dac51a93",
  measurementId: "G-6QYPXTE2C2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- ✅ function AFTER db ready -->
<script>
function submitItem() {
  const type = document.getElementById("type").value;
  const name = document.getElementById("name").value;
  const location = document.getElementById("location").value;

  if(name === "" || location === ""){
    alert("Fill all fields!");
    return;
  }

  db.collection(type).add({
    name: name,
    location: location
  })
  .then(() => {
    alert("Saved in Firebase 🔥");
  })
  .catch((error) => {
    console.log(error);
  });
}
</script>

</body>
</html>
